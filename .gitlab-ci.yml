# Указываем образ Docker, в котором будут выполняться все задания.
# Используем официальный образ Golang.
image: golang:latest

# Определяем этапы (stages) нашего пайплайна.
# Задания из следующего этапа начнутся только после успешного завершения всех заданий предыдущего.
stages:
  - format    # 1. Этап проверки стиля кода
  - test      # 2. Этап запуска тестов
  - build     # 3. Этап сборки бинарного файла

# --- ЗАДАНИЕ 1: ПРОВЕРКА ФОРМАТИРОВАНИЯ ---
# Будет выполняться на этапе 'format'.
format-job:
  stage: format
  script:
    # Проверяем форматирование всех .go файлов, игнорируя папку vendor
    - go fmt $(go list ./... | grep -v /vendor/)
    # Запускаем 'go vet' для статического анализа кода
    - go vet $(go list ./... | grep -v /vendor/)
  tags:
    - docker  # Указываем тег нашего раннера (если вы его задали)

# --- ЗАДАНИЕ 2: ЗАПУСК ТЕСТОВ ---
# Будет выполняться на этапе 'test' ПОСЛЕ успешного 'format-job'.
test-job:
  stage: test
  script:
    # Запускаем тесты с флагом -race (детектор гонок данных)
    - go test -race -v $(go list ./... | grep -v /vendor/)
  tags:
    - docker

# --- ЗАДАНИЕ 3: СБОРКА БИНАРНОГО ФАЙЛА ---
# Будет выполняться на этапе 'build' ПОСЛЕ успешного 'test-job'.
build-job:
  stage: build
  script:
    # Создаём директорию для бинарных файлов
    - mkdir -p ./binaries
    # Компилируем наш Go-проект
    - go build -o ./binaries/my-go-app ./...
  artifacts:
    # Сохраняем скомпилированный бинарный файл как артефакт сборки.
    # Его можно будет скачать со страницы pipeline'а.
    paths:
      - ./binaries
  tags:
    - docker
